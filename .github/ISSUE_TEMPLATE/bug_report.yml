name: Bug report
description: Report a bug in C4K Live
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: stremio_web_version
    attributes:
      label: "C4K Live Version"
      description: "Select the version of the C4K Live app you are using"
      options:
        - /development branch
        - c4k.live
        - local or self-hosted build
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: "Browser"
      description: "Which browser are you using?"
      options:
        - Chrome
        - Brave
        - Firefox
        - Arc
        - Opera
        - Safari
        - Edge
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: "Platform / Device type"
      description: "Which platform / device type are you using?"
      options:
        - Windows
        - Linux
        - MacOS
        - Android Web
        - Android PWA
        - iOS Web
        - iOS PWA
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: "What Happened?"
      description: "Describe the issue you encountered"
      placeholder: "Explain what you were doing, what you expected to happen, and what actually happened."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs"
      description: "Paste any relevant logs here (optional)"
      render: shell

  - type: textarea
    id: notes
    attributes:
      label: "Notes"
      description: "Any additional information (optional)"

  - type: checkboxes
    id: code_of_conduct
    attributes:
      label: "Code of Conduct"
      description: "Please confirm you have read and agree to the Code of Conduct"
      options:
        - label: "I agree"
    validations:
      required: true

