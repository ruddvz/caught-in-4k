name: Build

on:
  push:
    branches:
      - development
      - main
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - development
      - main
  # Allow manual dispatch in GH
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - name: Install NPM dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test
      - name: Lint
        run: pnpm lint
      # Create recursively the destination dir with
      # "--parrents where no error if existing, make parent directories as needed."
      - name: Disable Jekyll processing in published output
        run: touch ./build/.nojekyll
      - name: Deploy to GitHub Pages
        if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          allow_empty_commit: true
