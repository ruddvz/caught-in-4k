name: Build

on:
  push:
    branches:
      - development
      - main
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - development
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          PUBLIC_PATH: /caught-in-4k/

      - name: Disable Jekyll processing in published output
        run: touch ./build/.nojekyll

      - name: Deploy to GitHub Pages
        if: github.actor != 'dependabot[bot]' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Caught in 4K - Genesis build'
          publish_branch: gh-pages
          allow_empty_commit: true
